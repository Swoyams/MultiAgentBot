<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiAgentBot</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>MultiAgentBot (LangGraph)</h1>
      <p class="subtitle">Supervisor-driven multi-agent chatbot with memory, planning, coding, travel and budgeting.</p>

      <section id="chat" class="chat"></section>

      <form id="chat-form" class="composer">
        <textarea id="message" placeholder="Ask me anything..." required></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="/static/script.js"></script>
  </body>
</html>
